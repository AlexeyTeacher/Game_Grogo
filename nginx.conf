server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Redirect / to /web/ (the actual game entry point)
    location = / {
        return 301 /web/;
    }

    # Serve the game (HTML + JS)
    location /web/ {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    # Serve assets with long-term caching (images, font, music never change)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Compression for JS and HTML
    gzip on;
    gzip_vary on;
    gzip_types text/html application/javascript text/css;

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
